<div class="task-list">

  <h2>Tasks</h2>

  <!-- Filter 
   -->
  <select (change)="onStatusChange($event.target.value)">
    <option value="ALL">All</option>
    <option value="OPEN">Open</option>
    <option value="IN_PROGRESS">In Progress</option>
    <option value="DONE">Done</option>
  </select>

  <!-- Task Table -->
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Assigned To</th>
        <th>Due Date</th>
      </tr>
    </thead>

    <tbody>
      <ng-container *ngIf="userMap$ | async as userMap">
        <tr *ngFor="let task of tasks$ | async; trackBy: trackByTaskId">
          <td>{{ task.title }}</td>
          <td>{{ task.status }}</td>
          <td>{{ task.priority }}</td>
          <td>{{ userMap[task.assignedTo] || 'Unassigned' }}</td>
          <td>{{ task.dueDate | date  }}</td>
        </tr>
      </ng-container>
    </tbody>
  </table>

  <!-- Pagination -->
  <div class="pagination" *ngIf="total$ | async as total">
    <button
      (click)="onPageChange(page - 1)"
      [disabled]="total <= pageSize">
      Prev
    </button>

    <button [disabled]="page * pageSize >= total" (click)="onPageChange(page + 1)">Next</button>
    
  </div>

</div>
